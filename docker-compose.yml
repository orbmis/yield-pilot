services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yieldpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/yieldpilot?schema=public
      USE_FIXTURES: "true"
    ports:
      - "3000:3000"

volumes:
  postgres-data:
